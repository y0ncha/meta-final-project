name: meta

services:
  tomcat:
    image: ${TOMCAT_IMAGE:-tomcat:8.5.100-jdk17-temurin}
    container_name: meta-tomcat
    ports:
      - "${TOMCAT_HOST_PORT:-8080}:8080"
    volumes:
      - type: volume
        source: tomcat_webapps
        target: /usr/local/tomcat/webapps
    networks:
      - meta

  jenkins:
    build:
      context: .
      dockerfile: ops/jenkins/Dockerfile
      args:
        JENKINS_BASE_IMAGE: ${JENKINS_IMAGE:-jenkins/jenkins:2.528.1-lts-jdk21}
    image: ${META_JENKINS_IMAGE:-meta-jenkins:2.528.1-lts-jdk21}
    container_name: meta-jenkins
    user: root
    ports:
      - "${JENKINS_HOST_PORT:-8081}:8080"
    volumes:
      - type: volume
        source: jenkins_home
        target: /var/jenkins_home
      - type: bind
        source: .
        target: /workspace/final-project
      - type: volume
        source: tomcat_webapps
        target: /tomcat-webapps
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    networks:
      - meta

  playwright-runner:
    profiles:
      - tools
    image: ${PLAYWRIGHT_IMAGE:-mcr.microsoft.com/playwright:v1.60.0-noble}
    working_dir: /work
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://tomcat:8080/meta/}
      CI: "true"
    volumes:
      - type: bind
        source: .
        target: /work
    networks:
      - meta

  har-runner:
    profiles:
      - tools
    image: ${PLAYWRIGHT_IMAGE:-mcr.microsoft.com/playwright:v1.60.0-noble}
    working_dir: /work
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://tomcat:8080/meta/}
      HAR_PATH: ${HAR_PATH:-output/har/meta-functional-flow.har}
      CI: "true"
    volumes:
      - type: bind
        source: .
        target: /work
    networks:
      - meta

  gatling-runner:
    profiles:
      - tools
    image: ${GATLING_IMAGE:-denvazh/gatling:3.2.1}
    platform: ${GATLING_PLATFORM:-linux/amd64}
    working_dir: /work
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://tomcat:8080/meta/}
      GATLING_RUN_TYPE: ${GATLING_RUN_TYPE:-load-5m}
      GATLING_LOAD_USERS_PER_SEC: ${GATLING_LOAD_USERS_PER_SEC:-5}
      GATLING_STRESS_START_USERS_PER_SEC: ${GATLING_STRESS_START_USERS_PER_SEC:-5}
      GATLING_STRESS_TARGET_USERS_PER_SEC: ${GATLING_STRESS_TARGET_USERS_PER_SEC:-50}
      GATLING_MAX_START_USERS_PER_SEC: ${GATLING_MAX_START_USERS_PER_SEC:-5}
      GATLING_MAX_STEP_USERS_PER_SEC: ${GATLING_MAX_STEP_USERS_PER_SEC:-5}
      GATLING_MAX_LEVEL_COUNT: ${GATLING_MAX_LEVEL_COUNT:-10}
      GATLING_MAX_LEVEL_SECONDS: ${GATLING_MAX_LEVEL_SECONDS:-30}
      GATLING_MAX_RAMP_SECONDS: ${GATLING_MAX_RAMP_SECONDS:-10}
    volumes:
      - type: bind
        source: .
        target: /work
    networks:
      - meta

  playwright-runner-jenkins:
    profiles:
      - tools
    image: ${PLAYWRIGHT_IMAGE:-mcr.microsoft.com/playwright:v1.60.0-noble}
    working_dir: /workspace/final-project
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://tomcat:8080/meta/}
      CI: "true"
    volumes_from:
      - jenkins
    networks:
      - meta

  har-runner-jenkins:
    profiles:
      - tools
    image: ${PLAYWRIGHT_IMAGE:-mcr.microsoft.com/playwright:v1.60.0-noble}
    working_dir: /workspace/final-project
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://tomcat:8080/meta/}
      HAR_PATH: ${HAR_PATH:-output/har/meta-functional-flow.har}
      CI: "true"
    volumes_from:
      - jenkins
    networks:
      - meta

  gatling-runner-jenkins:
    profiles:
      - tools
    image: ${GATLING_IMAGE:-denvazh/gatling:3.2.1}
    platform: ${GATLING_PLATFORM:-linux/amd64}
    working_dir: /workspace/final-project
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://tomcat:8080/meta/}
      GATLING_RUN_TYPE: ${GATLING_RUN_TYPE:-load-5m}
      GATLING_LOAD_USERS_PER_SEC: ${GATLING_LOAD_USERS_PER_SEC:-5}
      GATLING_STRESS_START_USERS_PER_SEC: ${GATLING_STRESS_START_USERS_PER_SEC:-5}
      GATLING_STRESS_TARGET_USERS_PER_SEC: ${GATLING_STRESS_TARGET_USERS_PER_SEC:-50}
      GATLING_MAX_START_USERS_PER_SEC: ${GATLING_MAX_START_USERS_PER_SEC:-5}
      GATLING_MAX_STEP_USERS_PER_SEC: ${GATLING_MAX_STEP_USERS_PER_SEC:-5}
      GATLING_MAX_LEVEL_COUNT: ${GATLING_MAX_LEVEL_COUNT:-10}
      GATLING_MAX_LEVEL_SECONDS: ${GATLING_MAX_LEVEL_SECONDS:-30}
      GATLING_MAX_RAMP_SECONDS: ${GATLING_MAX_RAMP_SECONDS:-10}
    volumes_from:
      - jenkins
    networks:
      - meta

volumes:
  tomcat_webapps: {}
  jenkins_home: {}

networks:
  meta:
    name: meta
    driver: bridge
